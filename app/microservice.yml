---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: simpletimeservice
  labels:
    app: simpletimeservice
spec:
  replicas: 2
  selector:
    matchLabels:
      app: simpletimeservice
  template:
    metadata:
      labels:
        app: simpletimeservice
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
      containers:
        - name: simpletimeservice
          image: adsne19/simpletimeservice:latest
          ports:
            - containerPort: 8080
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          # Gunicorn needs a writable /tmp to spawn workers.
          # emptyDir gives it an in-memory scratch space while keeping
          # the rest of the filesystem read-only.
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
      volumes:
        - name: tmp
          emptyDir: {}

---
# Service: exposes the Deployment inside the cluster (ClusterIP, not LoadBalancer)
# Use `kubectl port-forward` or an Ingress controller to reach it externally.
apiVersion: v1
kind: Service
metadata:
  name: simpletimeservice
  labels:
    app: simpletimeservice
spec:
  type: ClusterIP
  selector:
    app: simpletimeservice
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8080
